name: Auto Tag, Build and Release

on:
  push:
    branches:
      - main

jobs:
  tag-build-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "${{ secrets.USERNAME }}"
          git config user.email "${{ secrets.EMAIL }}"

      # 获取最新 tag
      - name: Get latest tag
        id: get_tag
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$latest_tag"
          echo "latest_tag=$latest_tag" >> $GITHUB_OUTPUT

      # 计算版本
      - name: Determine version bump
        id: bump
        run: |
          tag="${{ steps.get_tag.outputs.latest_tag }}"
          tag="${tag#v}"
          IFS='.' read -r major minor patch <<< "$tag"

          commits=$(git log "${{ steps.get_tag.outputs.latest_tag }}"..HEAD --pretty=%B)

          bump_type=""

          if echo "$commits" | grep -q "BREAKING CHANGE"; then
            bump_type="major"
          elif echo "$commits" | grep -q "^feat"; then
            bump_type="minor"
          elif echo "$commits" | grep -q "^fix"; then
            bump_type="patch"
          fi

          if [ -z "$bump_type" ]; then
            echo "new_tag=" >> $GITHUB_OUTPUT
            echo "No version bump"
            exit 0
          fi

          case $bump_type in
            major)
              major=$((major+1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor+1))
              patch=0
              ;;
            patch)
              patch=$((patch+1))
              ;;
          esac

          new_tag="v$major.$minor.$patch"
          echo "new_tag=$new_tag"
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT

      # 创建 tag
      - name: Create and push tag
        if: steps.bump.outputs.new_tag != ''
        run: |
          git tag "${{ steps.bump.outputs.new_tag }}"
          git push origin "${{ steps.bump.outputs.new_tag }}"

      # 安装 Node
      - name: Setup Node.js
        if: steps.bump.outputs.new_tag != ''
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      # 安装依赖
      - name: Install dependencies
        if: steps.bump.outputs.new_tag != ''
        run: npm ci

      # 构建
      - name: Build
        if: steps.bump.outputs.new_tag != ''
        run: npm run build
        env:
          VERSION: ${{ steps.bump.outputs.new_tag }}

      # 处理产物
      - name: Prepare release assets
        if: steps.bump.outputs.new_tag != ''
        run: |
          cd dist
          mv index.html management.html

      # 生成 release notes
      - name: Generate release notes
        if: steps.bump.outputs.new_tag != ''
        run: |
          current_tag="${{ steps.bump.outputs.new_tag }}"
          previous_tag="$(git tag --list 'v*' --sort=-v:refname | grep -v "^${current_tag}$" | head -n 1 || true)"

          if [ -n "$previous_tag" ]; then
            range="$previous_tag..$current_tag"
          else
            range="$current_tag"
          fi

          git log --pretty=format:"- %h %s" "$range" > release-notes.md

      # 创建 release 并上传文件
      - name: Create Release
        if: steps.bump.outputs.new_tag != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.bump.outputs.new_tag }}   
          files: dist/management.html
          body_path: release-notes.md
          draft: false
          prerelease: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}